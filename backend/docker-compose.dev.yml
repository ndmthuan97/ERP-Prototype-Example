# ============================================================
# Docker Compose — DEV: chạy tất cả services + infra
# ============================================================
# Lệnh:
#   cd backend
#   docker compose -f docker-compose.dev.yml up --build     # Build + chạy tất cả
#   docker compose -f docker-compose.dev.yml up -d           # Chạy background
#   docker compose -f docker-compose.dev.yml down            # Dừng tất cả
#   docker compose -f docker-compose.dev.yml logs -f         # Xem logs
#   docker compose -f docker-compose.dev.yml logs -f customer-service  # Log 1 service
#
# Biến môi trường: đọc từ file .env cùng thư mục
# ============================================================

services:
  # ──────────────────────────────────────────────────────────
  # INFRASTRUCTURE
  # ──────────────────────────────────────────────────────────

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: >
      gcloud beta emulators pubsub start
      --host-port=0.0.0.0:8085
      --project=erp-prototype
    ports:
      - "8085:8085"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──────────────────────────────────────────────────────────
  # SHARED LIBRARY (build once, used by all services)
  # ──────────────────────────────────────────────────────────

  shared-builder:
    image: node:22-alpine
    working_dir: /app/shared
    volumes:
      - ./shared:/app/shared
      - shared_modules:/app/shared/node_modules
    command: sh -c "npm ci && npm run build"
    # One-shot: build and exit
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # APPLICATION SERVICES (dev mode with hot-reload)
  # ──────────────────────────────────────────────────────────

  customer-service:
    image: node:22-alpine
    working_dir: /app/customer-service
    volumes:
      - ./shared:/app/shared
      - shared_modules:/app/shared/node_modules
      - ./customer-service:/app/customer-service
      - customer_modules:/app/customer-service/node_modules
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      PORT: 3001
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
    command: sh -c "npm ci && npx prisma generate && npm run start:dev"
    depends_on:
      shared-builder:
        condition: service_completed_successfully
      pubsub-emulator:
        condition: service_started
    restart: unless-stopped

  inventory-service:
    image: node:22-alpine
    working_dir: /app/inventory-service
    volumes:
      - ./shared:/app/shared
      - shared_modules:/app/shared/node_modules
      - ./inventory-service:/app/inventory-service
      - inventory_modules:/app/inventory-service/node_modules
    ports:
      - "3003:3003"
    env_file: .env
    environment:
      PORT: 3003
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
    command: sh -c "npm ci && npx prisma generate && npm run start:dev"
    depends_on:
      shared-builder:
        condition: service_completed_successfully
      pubsub-emulator:
        condition: service_started
    restart: unless-stopped

  sales-service:
    image: node:22-alpine
    working_dir: /app/sales-service
    volumes:
      - ./shared:/app/shared
      - shared_modules:/app/shared/node_modules
      - ./sales-service:/app/sales-service
      - sales_modules:/app/sales-service/node_modules
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      PORT: 3002
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      CUSTOMER_SERVICE_URL: http://customer-service:3001
    command: sh -c "npm ci && npx prisma generate && npm run start:dev"
    depends_on:
      shared-builder:
        condition: service_completed_successfully
      pubsub-emulator:
        condition: service_started
    restart: unless-stopped


  catalog-service:
    image: node:22-alpine
    working_dir: /app/catalog-service
    volumes:
      - ./shared:/app/shared
      - shared_modules:/app/shared/node_modules
      - ./catalog-service:/app/catalog-service
      - catalog_modules:/app/catalog-service/node_modules
    ports:
      - "3005:3005"
    env_file: .env
    environment:
      PORT: 3005
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
    command: sh -c "npm ci && npx prisma generate && npm run start:dev"
    depends_on:
      shared-builder:
        condition: service_completed_successfully
      pubsub-emulator:
        condition: service_started
    restart: unless-stopped

  purchasing-service:
    image: node:22-alpine
    working_dir: /app/purchasing-service
    volumes:
      - ./shared:/app/shared
      - shared_modules:/app/shared/node_modules
      - ./purchasing-service:/app/purchasing-service
      - purchasing_modules:/app/purchasing-service/node_modules
    ports:
      - "3006:3006"
    env_file: .env
    environment:
      PORT: 3006
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
    command: sh -c "npm ci && npx prisma generate && npm run start:dev"
    depends_on:
      shared-builder:
        condition: service_completed_successfully
      pubsub-emulator:
        condition: service_started
    restart: unless-stopped

  auth-service:
    image: node:22-alpine
    working_dir: /app/auth-service
    volumes:
      - ./shared:/app/shared
      - shared_modules:/app/shared/node_modules
      - ./auth-service:/app/auth-service
      - auth_modules:/app/auth-service/node_modules
    ports:
      - "3004:3004"
    env_file: .env
    environment:
      PORT: 3004
    command: sh -c "npm ci && npx prisma generate && npm run start:dev"
    depends_on:
      shared-builder:
        condition: service_completed_successfully
      pubsub-emulator:
        condition: service_started
    restart: unless-stopped

  api-gateway:
    image: node:22-alpine
    working_dir: /app/api-gateway
    volumes:
      - ./api-gateway:/app/api-gateway
      - gateway_modules:/app/api-gateway/node_modules
    ports:
      - "3010:3010"
    env_file: .env
    environment:
      PORT: 3010
      # Inside Docker network, services communicate via container names
      AUTH_SERVICE_URL: http://auth-service:3004
      CUSTOMER_SERVICE_URL: http://customer-service:3001
      ORDER_SERVICE_URL: http://sales-service:3002
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      CATALOG_SERVICE_URL: http://catalog-service:3005
      PURCHASING_SERVICE_URL: http://purchasing-service:3006
    command: sh -c "npm ci && npm run start:dev"
    depends_on:
      customer-service:
        condition: service_started
      inventory-service:
        condition: service_started
      sales-service:
        condition: service_started
      auth-service:
        condition: service_started
      catalog-service:
        condition: service_started
      purchasing-service:
        condition: service_started
    restart: unless-stopped

# ──────────────────────────────────────────────────────────
# Named volumes — persist node_modules across restarts
# ──────────────────────────────────────────────────────────
volumes:
  shared_modules:
  customer_modules:
  inventory_modules:
  sales_modules:
  auth_modules:
  gateway_modules:
  catalog_modules:
  purchasing_modules:
