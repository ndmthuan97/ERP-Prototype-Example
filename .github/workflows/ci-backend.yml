name: CI — Backend

on:
  # Cho phép trigger tay từ tab Actions (không phụ thuộc path filter).
  workflow_dispatch:
  push:
    branches: [main]
    # Bao gồm chính file workflow này: sửa CI mà không đụng backend/** vẫn chạy
    # lại (nếu không, push riêng workflow sẽ KHÔNG khớp path → không trigger).
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  # ============================================================
  # Step 1: Detect which services changed
  # ============================================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      # ci_config = chỉ file workflow đổi. Dùng để ÉP verify (bắt lỗi cấu hình)
      # nhưng KHÔNG kích hoạt build-and-push (không deploy lại prod vì sửa CI).
      ci_config: ${{ steps.filter.outputs.ci_config }}
      auth: ${{ steps.filter.outputs.auth }}
      customer: ${{ steps.filter.outputs.customer }}
      sales: ${{ steps.filter.outputs.sales }}
      inventory: ${{ steps.filter.outputs.inventory }}
      catalog: ${{ steps.filter.outputs.catalog }}
      purchasing: ${{ steps.filter.outputs.purchasing }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shared:
              - 'backend/shared/**'
              - 'backend/Dockerfile'
              - 'backend/.dockerignore'
            ci_config:
              - '.github/workflows/ci-backend.yml'
            auth: 'backend/auth-service/**'
            customer: 'backend/customer-service/**'
            sales: 'backend/sales-service/**'
            inventory: 'backend/inventory-service/**'
            catalog: 'backend/catalog-service/**'
            purchasing: 'backend/purchasing-service/**'
            gateway: 'backend/api-gateway/**'

  # ============================================================
  # Step 2: Verify chất lượng code cho service thay đổi
  # (chạy trên cả PR và push → bắt lỗi sớm, chặn build+deploy nếu fail).
  #
  # Backend KHÔNG dùng npm workspaces: mỗi service có node_modules +
  # Prisma Client riêng, và jest map '@erp/shared' → '../shared/src'.
  # Vì vậy verify chạy theo matrix từng service: cài @erp/shared trước
  # rồi cài service, sau đó chạy các script THỰC SỰ TỒN TẠI:
  #   - shared:   typecheck (tsc --noEmit) + test (jest)
  #   - service:  lint:check (eslint, KHÔNG --fix) nếu có + test (jest)
  # Tất cả service (kể cả api-gateway) đều có 'lint:check' non-mutating.
  # Chỉ verify service có thay đổi (hoặc khi shared đổi → verify hết).
  # ============================================================
  verify:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            changed: ${{ needs.detect-changes.outputs.auth }}
            run_lint: true
          - service: customer-service
            changed: ${{ needs.detect-changes.outputs.customer }}
            run_lint: true
          - service: sales-service
            changed: ${{ needs.detect-changes.outputs.sales }}
            run_lint: true
          - service: inventory-service
            changed: ${{ needs.detect-changes.outputs.inventory }}
            run_lint: true
          - service: catalog-service
            changed: ${{ needs.detect-changes.outputs.catalog }}
            run_lint: true
          - service: purchasing-service
            changed: ${{ needs.detect-changes.outputs.purchasing }}
            run_lint: true
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
            run_lint: true
    steps:
      - name: Check if verify needed
        id: check
        run: |
          # Verify chạy khi: service này đổi HOẶC shared đổi HOẶC file workflow
          # đổi (ci_config) → sửa CI vẫn được kiểm tra thật, không skip thành
          # "green giả". (build-and-push KHÔNG dùng ci_config → không deploy.)
          if [[ "${{ matrix.changed }}" == "true" || "${{ needs.detect-changes.outputs.shared }}" == "true" || "${{ needs.detect-changes.outputs.ci_config }}" == "true" ]]; then
            echo "should_verify=true" >> $GITHUB_OUTPUT
          else
            echo "Skipping ${{ matrix.service }} — no changes"
            echo "should_verify=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v7
        if: steps.check.outputs.should_verify == 'true'

      - name: Setup Node
        if: steps.check.outputs.should_verify == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # @erp/shared là dependency 'file:../shared' + jest resolve tới
      # shared/src, nên phải cài (và verify) shared trước.
      # Build shared → dist so downstream services can resolve @erp/shared. The
      # services' ESLint is type-aware (recommendedTypeChecked + projectService)
      # and @erp/shared's `types` point at dist/index.d.ts, so WITHOUT this build
      # every @erp/shared import resolves to `any` and the Lint step drowns in
      # no-unsafe-* errors (api-gateway is the only service that doesn't import
      # @erp/shared, which is why it was the only one whose Lint passed).
      - name: Install, build & verify shared
        if: steps.check.outputs.should_verify == 'true'
        working-directory: backend/shared
        run: |
          npm ci
          npm run typecheck
          npm run build
          npm test

      - name: Install service dependencies
        if: steps.check.outputs.should_verify == 'true'
        working-directory: backend/${{ matrix.service }}
        run: npm ci

      # Prisma Client cần generate trước khi typecheck/test biên dịch được.
      - name: Generate Prisma Client
        if: steps.check.outputs.should_verify == 'true'
        working-directory: backend/${{ matrix.service }}
        run: |
          if [ -f "prisma/schema.prisma" ]; then npx prisma generate; fi

      - name: Lint
        if: steps.check.outputs.should_verify == 'true' && matrix.run_lint
        working-directory: backend/${{ matrix.service }}
        run: npm run lint:check

      - name: Test
        if: steps.check.outputs.should_verify == 'true'
        working-directory: backend/${{ matrix.service }}
        run: npm test

  # ============================================================
  # Step 3: Build & push changed services
  # ============================================================
  build-and-push:
    needs: [detect-changes, verify]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    # Serialize deploy của cùng 1 service qua các run liên tiếp (tránh race,
    # không hủy nửa chừng để deploy đang chạy không bị ngắt).
    concurrency:
      group: deploy-${{ matrix.service }}-dev
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            changed: ${{ needs.detect-changes.outputs.auth }}
            run_flags: --vpc-connector=erp-vpc-connector --vpc-egress=private-ranges-only
          - service: customer-service
            changed: ${{ needs.detect-changes.outputs.customer }}
            run_flags: --vpc-connector=erp-vpc-connector --vpc-egress=private-ranges-only
          - service: sales-service
            changed: ${{ needs.detect-changes.outputs.sales }}
            run_flags: --vpc-connector=erp-vpc-connector --vpc-egress=private-ranges-only
          - service: inventory-service
            changed: ${{ needs.detect-changes.outputs.inventory }}
            run_flags: --vpc-connector=erp-vpc-connector --vpc-egress=private-ranges-only
          - service: catalog-service
            changed: ${{ needs.detect-changes.outputs.catalog }}
            run_flags: --vpc-connector=erp-vpc-connector --vpc-egress=private-ranges-only
          - service: purchasing-service
            changed: ${{ needs.detect-changes.outputs.purchasing }}
            run_flags: --vpc-connector=erp-vpc-connector --vpc-egress=private-ranges-only
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
            run_flags: --vpc-connector=erp-vpc-connector --vpc-egress=private-ranges-only --allow-unauthenticated
    steps:
      - name: Check if build needed
        id: check
        run: |
          # CỐ Ý không dùng ci_config ở đây: sửa file workflow chỉ verify lại,
          # KHÔNG build+deploy lại toàn bộ service prod. Chỉ deploy khi code
          # service đổi (matrix.changed) hoặc shared/Dockerfile đổi (shared).
          if [[ "${{ matrix.changed }}" == "true" || "${{ needs.detect-changes.outputs.shared }}" == "true" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "Skipping ${{ matrix.service }} — no changes"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v7
        if: steps.check.outputs.should_build == 'true'

      - name: Authenticate to GCP (WIF)
        if: steps.check.outputs.should_build == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - name: Setup gcloud
        if: steps.check.outputs.should_build == 'true'
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        if: steps.check.outputs.should_build == 'true'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Docker image
        if: steps.check.outputs.should_build == 'true'
        run: |
          docker build \
            --build-arg SERVICE_DIR=${{ matrix.service }} \
            -t us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/erp-services/${{ matrix.service }}:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/erp-services/${{ matrix.service }}:latest \
            -f backend/Dockerfile backend/

      - name: Push Docker image
        if: steps.check.outputs.should_build == 'true'
        run: |
          docker push us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/erp-services/${{ matrix.service }}:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/erp-services/${{ matrix.service }}:latest

      # Deploy ngay service vừa build, pin theo commit SHA (immutable → rollback
      # được, và service không đổi ở commit này sẽ không bị tạo revision mới).
      - name: Deploy to Cloud Run
        if: steps.check.outputs.should_build == 'true'
        run: |
          gcloud run deploy ${{ matrix.service }}-dev \
            --image=us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/erp-services/${{ matrix.service }}:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            ${{ matrix.run_flags }} \
            --quiet
