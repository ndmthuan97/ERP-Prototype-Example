name: CD — Deploy to Cloud Run

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI — Backend", "CI — Frontend"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            cloud_run: auth-service-dev
          - service: customer-service
            cloud_run: customer-service-dev
          - service: sales-service
            cloud_run: sales-service-dev
          - service: inventory-service
            cloud_run: inventory-service-dev
          - service: catalog-service
            cloud_run: catalog-service-dev
          - service: purchasing-service
            cloud_run: purchasing-service-dev
          - service: api-gateway
            cloud_run: api-gateway-dev
          - service: frontend
            cloud_run: frontend-dev
    steps:
      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy ${{ matrix.service }} to Cloud Run
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/erp-services/${{ matrix.service }}:latest"
          
          echo "Deploying $IMAGE to ${{ matrix.cloud_run }}"
          gcloud run services update ${{ matrix.cloud_run }} \
            --image="$IMAGE" \
            --region=us-central1 \
            --project=${{ vars.GCP_PROJECT }} \
            --quiet
