name: CD — Manual Full Deploy / Rollback

# Auto-deploy khi merge vào main giờ do CI — Backend / CI — Frontend đảm nhiệm
# (mỗi CI deploy chọn lọc service của mình theo commit SHA). Workflow này chỉ
# dùng khi cần deploy TẤT CẢ service một lượt: provision lần đầu, disaster
# recovery, hoặc rollback đồng loạt về một tag đã biết.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag để deploy (commit SHA để rollback, hoặc 'latest')"
        default: latest
        required: true

# Không cho 2 lần full-deploy chồng nhau (mỗi bên cùng ghi tag lên cùng service).
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Trigger Cloud Build Deploy
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions=_TAG=${{ inputs.tag }} \
            --project=${{ vars.GCP_PROJECT }}
