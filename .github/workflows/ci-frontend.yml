name: CI — Frontend

on:
  push:
    branches: [main]
    paths: ['frontend/**']
  pull_request:
    branches: [main]
    paths: ['frontend/**']

jobs:
  # ============================================================
  # Step 1: Verify chất lượng code (chạy trên cả PR và push).
  # Chặn build+deploy nếu typecheck/lint fail → bắt lỗi sớm.
  # ============================================================
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

  # ============================================================
  # Step 2: Build & push (chỉ chạy trên push, sau khi verify pass).
  # ============================================================
  build-and-push:
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    # Serialize deploy frontend qua các run liên tiếp (tránh race trên revision).
    concurrency:
      group: deploy-frontend-dev
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_GATEWAY=${{ vars.NEXT_PUBLIC_API_GATEWAY }} \
            -t us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/erp-services/frontend:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/erp-services/frontend:latest \
            frontend/

      - name: Push Docker image
        run: |
          docker push us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/erp-services/frontend:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/erp-services/frontend:latest

      # Deploy frontend pin theo commit SHA (immutable → rollback được).
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy frontend-dev \
            --image=us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/erp-services/frontend:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --quiet
